    <title>Silk</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ✅ 强制隐藏所有滚动条 */
        html, body {
            overflow: hidden !important;
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        body {
            font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
            background: linear-gradient(135deg, #FDF8F0 0%, #F5EDE0 50%, #EDE4D3 100%);
        }
        
        /* 细滚动条（仅内容区域可见，不影响全局） */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(169, 137, 77, 0.25);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(169, 137, 77, 0.45);
        }
        
        html {
            scrollbar-width: thin;
            scrollbar-color: rgba(169, 137, 77, 0.25) transparent;
        }
        
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* 加载指示器 - 丝滑风格 */
        #loading {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #FDF8F0 0%, #F5EDE0 50%, #EDE4D3 100%);
        }
        
        #loading .logo {
            font-size: 48px;
            font-weight: 600;
            color: #C9A86C;
            letter-spacing: 8px;
            margin-bottom: 24px;
            font-family: 'Cormorant Garamond', Georgia, serif;
            text-transform: uppercase;
        }
        
        #loading .loader {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #C9A86C, transparent);
            border-radius: 2px;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(0.5); }
            50% { opacity: 1; transform: scaleX(1); }
        }
        
        #loading .subtitle {
            margin-top: 20px;
            font-size: 14px;
            color: #A8894D;
            letter-spacing: 2px;
        }
    </style>
</head>

    <div id="root">
        <div id="loading">

            <div class="loader"></div>
            <div class="subtitle">Smooth & Simple</div>
        </div>
    </div>
