# Silk reverse proxy for current port layout:
# - frontend internal: 18005  -> public: 36795
# - backend  internal: 18003  -> public: 36796
#
# Usage:
# 1) sudo cp /home/silk/silk_v2/nginx_silk_36795_36796.conf /etc/nginx/sites-available/silk-ports.conf
# 2) sudo ln -sf /etc/nginx/sites-available/silk-ports.conf /etc/nginx/sites-enabled/silk-ports.conf
# 3) sudo nginx -t && sudo systemctl reload nginx
#
# Note:
# - This file enables HTTP on 36795/36796 immediately.
# - If you need HTTPS, add certificate paths in the commented ssl blocks below.

# Frontend public entry (HTTP)
server {
    listen 36795;
    listen [::]:36795;
    server_name ai-silk.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:18005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend public entry (HTTP)
server {
    listen 36796;
    listen [::]:36796;
    server_name ai-silk.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:18003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for /chat endpoint.
    location /chat {
        proxy_pass http://127.0.0.1:18003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

