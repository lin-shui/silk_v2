name: Backend Contract Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-contract.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-contract.yml"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run backend contract tests
        run: ./gradlew :backend:test --stacktrace

      - name: Upload backend test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/build/reports/tests/test
            backend/build/test-results/test
