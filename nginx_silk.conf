# Silk nginx standalone template
#
# Usage:
# 1. Replace the __PLACEHOLDER__ values below.
# 2. Start with: nginx -p <runtime_dir> -c /path/to/this/file
#
# Notes:
# - `__STATIC_ROOT__` should point to the built WebApp assets, typically `backend/static`.
# - `__BACKEND_UPSTREAM__` should point to the backend's internal listen address, e.g. `127.0.0.1:8006`.
# - If HTTPS is terminated by an outer load balancer / reverse proxy, keep `listen` plain HTTP and preserve
#   the incoming `X-Forwarded-Proto` / `X-Forwarded-Port` headers.
# - If nginx itself terminates HTTPS, change `__LISTEN_DIRECTIVE__` to `listen 443 ssl;` and uncomment the
#   `ssl_certificate` / `ssl_certificate_key` lines in the `server` block.

worker_processes 1;
pid __PID_FILE__;
error_log __ERROR_LOG__ info;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size __CLIENT_MAX_BODY_SIZE__;
    access_log __ACCESS_LOG__;

    types {
        text/html html htm shtml;
        text/css css;
        text/plain txt;
        text/xml xml;
        application/javascript js mjs;
        application/json json map;
        application/wasm wasm;
        image/svg+xml svg svgz;
        image/png png;
        image/jpeg jpg jpeg;
        image/gif gif;
        image/x-icon ico;
        font/ttf ttf;
        font/otf otf;
        font/woff woff;
        font/woff2 woff2;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        '' $scheme;
    }

    map $http_x_forwarded_host $forwarded_host {
        default $http_x_forwarded_host;
        '' $host;
    }

    map $http_x_forwarded_port $forwarded_port {
        default $http_x_forwarded_port;
        '' $server_port;
    }

    client_body_temp_path __CLIENT_BODY_TEMP__;
    proxy_temp_path __PROXY_TEMP__;
    fastcgi_temp_path __FASTCGI_TEMP__;
    uwsgi_temp_path __UWSGI_TEMP__;
    scgi_temp_path __SCGI_TEMP__;

    server {
        __LISTEN_DIRECTIVE__
        server_name __SERVER_NAME__;
        root __STATIC_ROOT__;
        index index.html;

        # Optional TLS when nginx itself terminates HTTPS:
        # ssl_certificate /path/to/fullchain.pem;
        # ssl_certificate_key /path/to/privkey.pem;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot|map|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /auth {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /groups {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /contacts {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /users {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /download {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /health {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
        }

        location /chat {
            proxy_pass http://__BACKEND_UPSTREAM__;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host $forwarded_host;
            proxy_set_header X-Forwarded-Port $forwarded_port;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
