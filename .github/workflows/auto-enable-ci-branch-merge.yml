name: Auto Enable CI Branch Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge for CI branch PRs
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.ref == 'chore/ci-auto-merge'
    steps:
      - name: Enable auto-merge with merge commit
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.draft) {
              core.info(`PR #${pr.number} is draft, skip for now.`);
              return;
            }

            try {
              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }
                  ) {
                    clientMutationId
                  }
                }`,
                { pullRequestId: pr.node_id }
              );
              core.info(`Enabled auto-merge (MERGE) for PR #${pr.number}.`);
            } catch (error) {
              const message = (error && error.message) || "";
              if (/already enabled/i.test(message)) {
                core.info(`Auto-merge already enabled for PR #${pr.number}.`);
                return;
              }
              throw error;
            }
